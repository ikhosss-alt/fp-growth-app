<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">FP-Growth System</span>
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow p-4">
        <h4 class="mb-3">Analisis Data</h4>

        <form method="POST">
            <div class="row">
                <div class="col">
                    <input type="text" name="support" class="form-control" placeholder="Min Support (0.2)" required>
                </div>
                <div class="col">
                    <input type="text" name="confidence" class="form-control" placeholder="Min Confidence (0.5)" required>
                </div>
            </div>

            <button class="btn btn-success mt-3">Proses FP-Growth</button>
        </form>

        <hr>

        <a href="/upload" class="btn btn-warning">Upload Data</a>
        <a href="/hasil" class="btn btn-info">Lihat Hasil</a>

    </div>

</div>

</body>
</html>
